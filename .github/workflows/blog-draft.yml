name: Weekly Blog Draft

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  # Allow manual trigger (e.g. to test or get an extra post)
  workflow_dispatch:

jobs:
  draft-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate post (RSS → Claude → visuals)
        id: gen
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: node scripts/draft-post.mjs

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: blog-draft/${{ steps.gen.outputs.slug }}
          commit-message: "blog: draft '${{ steps.gen.outputs.slug }}'"
          title: "Blog-Entwurf: ${{ steps.gen.outputs.titel }}"
          body: |
            Automatisch generierter Blog-Entwurf (Together AI: Llama-3.3-70B-Free + FLUX.1-schnell-Free).

            **Checkliste vor dem Merge:**
            - [ ] Deutschen Text gelesen und ggf. korrigiert
            - [ ] Englischen Text geprüft
            - [ ] Hero-Bild passt zum Thema (liegt in `public/blog/images/`)
            - [ ] Key-Takeaways-Karte stimmt (`public/blog/visuals/`)
            - [ ] `draft: true` → `draft: false` in der `.md`-Datei setzen
            - [ ] Quellen-URL ist korrekt und erreichbar

            *Erstellt durch den wöchentlichen Blog-Draft-Workflow. Nicht auto-mergen.*
          labels: blog-draft
          add-paths: |
            src/content/blog/
            public/blog/
